# PropOS production compose (Phase 8.1)
# TLS terminated by Caddy. Secrets via env file (never commit real .env.prod).
#
# Usage:
#   cp infrastructure/docker/.env.prod.example infrastructure/docker/.env.prod
#   docker compose -f infrastructure/docker/docker-compose.prod.yml --env-file infrastructure/docker/.env.prod up -d --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-propos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-propos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-propos} -d ${POSTGRES_DB:-propos}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [propos]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [propos]

  api:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
    restart: unless-stopped
    user: "1001:1001"
    environment:
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS}
      DATABASE_URL: postgresql://${POSTGRES_USER:-propos}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-propos}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET}
      STORAGE_URL_SECRET: ${STORAGE_URL_SECRET:?set STORAGE_URL_SECRET}
      PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY:?set PII_ENCRYPTION_KEY}
      DATA_RESIDENCY_REGION: ${DATA_RESIDENCY_REGION:-ap-south-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/api/v1/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks: [propos]
    # no host ports — only via Caddy

  web:
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?set NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:?set NEXT_PUBLIC_WS_URL}
    restart: unless-stopped
    user: "1001:1001"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks: [propos]

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
    networks: [propos]

networks:
  propos:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
