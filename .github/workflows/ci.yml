name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://propos:propos@localhost:5432/propos

jobs:
  lint-build:
    name: Lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - name: Lint
        run: pnpm lint
      - name: Build
        run: pnpm build

  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: propos
          POSTGRES_PASSWORD: propos
          POSTGRES_DB: propos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U propos -d propos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://propos:propos@localhost:5432/propos
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - name: Unit + coverage
        run: pnpm --filter @propos/backend test:cov
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/lcov.info
          if-no-files-found: ignore

  frontend-test:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Vitest
        run: pnpm --filter @propos/frontend test

  prisma-migration-check:
    name: Prisma migration check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Schema vs migration
        run: node scripts/check-prisma-migration.cjs

  audit:
    name: Dependency audit (warn)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit (high+)
        run: pnpm audit --audit-level=high

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    # Full stack is heavy; keep non-blocking until docker images are CI-stable
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
      - name: Start stack
        run: docker compose -f infrastructure/docker/docker-compose.full.yml up -d --build
      - name: Wait for API
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3001/api/v1/health/live; then exit 0; fi
            sleep 5
          done
          echo "API did not become ready"; exit 1
      - name: Seed demo data
        run: |
          docker compose -f infrastructure/docker/docker-compose.full.yml exec -T api \
            node -e "console.log('seed via migrate on boot if configured')" || true
      - name: E2E
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          PLAYWRIGHT_API_URL: http://localhost:3001/api/v1
        run: pnpm test:e2e
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
      - name: Tear down
        if: always()
        run: docker compose -f infrastructure/docker/docker-compose.full.yml down -v
